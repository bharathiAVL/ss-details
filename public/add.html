<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New User</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Add New User</h1>
  <form id="addUserForm">
    <input type="text" id="newName" placeholder="Display Name" required><br><br>
    <input type="text" id="newUsername" placeholder="Username" required><br><br>
    <input type="text" id="newPassword" placeholder="Password" required><br><br>
    <input type="url" id="newLink" placeholder="Profile Link" required><br><br>
    <button type="submit">Add User</button>
  </form>
  <br><a href="index.html">🏠 Back to Home</a>

  <script src="script.js"></script>
</body>
</html>
